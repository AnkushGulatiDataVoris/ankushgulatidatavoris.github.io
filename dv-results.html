<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Data Maturity Report — Datavoris</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@300;400;500;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --n9:#050e1f;--n8:#0a1628;--n7:#0f1e3d;--n6:#162444;--n5:#1d2f54;--n4:#2a3f6b;--n3:#3d5585;
  --cyan:#00d4ff;--cdim:rgba(0,212,255,0.1);--cglow:rgba(0,212,255,0.25);
  --amber:#f59e0b;--adim:rgba(245,158,11,0.1);--em:#10d9a0;--rose:#fb7185;
  --wh:#f8faff;--off:#eef2fa;--card:#fff;
  --t1:#f0f6ff;--t3:#c8d8f0;--t5:#7a90b8;--t7:#3d5585;
  --ow9:#080e1e;--ow7:#1a2744;--ow5:#4a607e;--ow3:#7a90b8;
  --bn:rgba(255,255,255,0.07);--bw:rgba(8,14,30,0.1);
  --r:14px;--rsm:9px;--rxl:24px;
  --fd:'Cabinet Grotesk',sans-serif;--fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:var(--fb);background:var(--wh);color:var(--ow9);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.nav{width:100%;background:var(--n8);border-bottom:1px solid var(--bn);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;}
.brand{font-family:var(--fd);font-size:1.1rem;font-weight:800;color:var(--t1);letter-spacing:-0.02em;display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
.bmark{width:28px;height:28px;border-radius:7px;background:var(--cyan);color:var(--n9);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:900;}
.hire-btn{background:var(--cyan);color:var(--n9);font-family:var(--fb);font-size:0.8rem;font-weight:700;padding:0.45rem 1rem;border-radius:999px;text-decoration:none;border:none;cursor:pointer;}
.main{width:100%;max-width:820px;padding:2.5rem 1.5rem 8rem;}
.fade{animation:fu 0.5s var(--ease) both;}
.fade2{animation:fu 0.5s 0.1s var(--ease) both;}
.fade3{animation:fu 0.5s 0.2s var(--ease) both;}
.fade4{animation:fu 0.5s 0.3s var(--ease) both;}
.fade5{animation:fu 0.5s 0.4s var(--ease) both;}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* HEADER ZONE */
.page-eyebrow{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:var(--cyan);background:var(--cdim);border:1px solid rgba(0,212,255,0.2);border-radius:999px;padding:0.25rem 0.85rem;display:inline-flex;margin-bottom:1rem;}
.page-title{font-family:var(--fd);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:800;color:var(--ow9);letter-spacing:-0.03em;line-height:1.1;margin-bottom:0.6rem;}
.page-title em{color:var(--cyan);font-style:normal;background:linear-gradient(135deg,var(--cyan),#5b9dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{font-size:0.93rem;color:var(--ow5);line-height:1.75;margin-bottom:2rem;max-width:580px;}

/* SCORE HERO */
.score-hero{background:var(--n8);border-radius:var(--rxl);padding:2.5rem;display:flex;gap:2rem;align-items:center;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.score-hero::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(0,212,255,0.1),transparent 65%);}
.score-hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(245,158,11,0.08),transparent 65%);}
.score-num{font-family:var(--fd);font-size:5.5rem;font-weight:900;color:#fff;letter-spacing:-0.06em;line-height:1;white-space:nowrap;position:relative;z-index:1;}
.score-num sub{font-size:2rem;opacity:0.35;font-family:var(--fb);font-weight:400;vertical-align:baseline;}
.score-meta{flex:1;position:relative;z-index:1;}
.tier-badge{display:inline-block;font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:999px;margin-bottom:0.75rem;}
.score-desc{font-size:0.9rem;color:rgba(255,255,255,0.65);line-height:1.75;font-weight:300;}

/* SECTION LABEL */
.sec-label{font-size:0.68rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ow3);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bw);}

/* PILLARS GRID */
.pillars-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;margin-bottom:1.25rem;}
.pillar-card{background:var(--card);border:1px solid var(--bw);border-radius:var(--r);padding:1.2rem 0.9rem;text-align:center;position:relative;overflow:hidden;transition:transform 0.2s var(--ease),box-shadow 0.2s;}
.pillar-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(8,14,30,0.1);}
.pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.pillar-name{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ow3);margin-bottom:0.6rem;}
.pillar-score{font-family:var(--fd);font-size:1.9rem;font-weight:900;letter-spacing:-0.04em;line-height:1;margin-bottom:0.5rem;}
.pillar-bar-bg{height:4px;background:var(--off);border-radius:2px;overflow:hidden;}
.pillar-bar-fill{height:100%;border-radius:2px;transition:width 1s var(--ease);}
.pillar-label{font-size:0.68rem;color:var(--ow3);margin-top:0.5rem;}

/* RADAR */
.radar-card{background:var(--card);border:1px solid var(--bw);border-radius:var(--r);padding:2rem 1.5rem 1.5rem;margin-bottom:1.25rem;}
.radar-wrap{max-width:480px;margin:0 auto;}

/* DIMENSION TABLE */
.dim-table{background:var(--card);border:1px solid var(--bw);border-radius:var(--r);overflow:hidden;margin-bottom:1.25rem;}
.dim-hdr{display:grid;grid-template-columns:1fr 60px 100px;padding:0.75rem 1.25rem;background:var(--off);border-bottom:1px solid var(--bw);font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ow3);}
.dim-row{display:grid;grid-template-columns:1fr 60px 100px;padding:0.875rem 1.25rem;border-bottom:1px solid var(--bw);align-items:center;transition:background 0.15s;}
.dim-row:last-child{border-bottom:none;}
.dim-row:hover{background:var(--off);}
.dim-name{font-size:0.85rem;color:var(--ow7);font-weight:500;}
.dim-pillar{font-size:0.7rem;color:var(--ow3);margin-top:2px;letter-spacing:0.04em;}
.dim-score-val{font-size:0.95rem;font-weight:700;color:var(--ow9);text-align:center;}
.dim-status{font-size:0.72rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:999px;text-align:center;display:inline-flex;align-items:center;justify-content:center;}
.st-strong{background:#ecfdf5;color:#059669;}
.st-mid{background:#fffbeb;color:#92400e;}
.st-low{background:#fef2f2;color:#dc2626;}

/* INSIGHTS */
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;}
.insight-card{background:var(--card);border:1.5px solid var(--bw);border-radius:var(--r);padding:1.4rem;position:relative;overflow:hidden;}
.insight-card.strength::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#10b981;}
.insight-card.gap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rose);}
.ins-type{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem;}
.strength .ins-type{color:#059669;}
.gap .ins-type{color:#dc2626;}
.ins-dim{font-size:0.95rem;font-weight:700;color:var(--ow9);margin-bottom:0.5rem;font-family:var(--fd);}
.ins-text{font-size:0.83rem;color:var(--ow5);line-height:1.65;}

/* PRIORITY ACTIONS */
.priority-list{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.25rem;}
.priority-item{background:var(--card);border:1px solid var(--bw);border-radius:var(--r);padding:1.2rem 1.25rem;display:flex;gap:1rem;align-items:flex-start;}
.priority-num{width:28px;height:28px;border-radius:50%;background:var(--n8);color:var(--cyan);font-size:0.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fd);}
.priority-content{}
.priority-title{font-size:0.9rem;font-weight:700;color:var(--ow9);margin-bottom:0.3rem;font-family:var(--fd);}
.priority-text{font-size:0.82rem;color:var(--ow5);line-height:1.6;}

/* HIRE CTA */
.hire-cta{background:var(--n8);border-radius:var(--rxl);padding:3rem 2.5rem;text-align:center;position:relative;overflow:hidden;margin-top:2.5rem;}
.hire-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 0%,rgba(0,212,255,0.07),transparent);pointer-events:none;}
.hire-cta::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),#5b9dff,var(--cyan));background-size:200% auto;animation:sh 3s linear infinite;}
@keyframes sh{to{background-position:200% center;}}
.hire-eyebrow{display:inline-flex;font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;color:var(--cyan);background:var(--cdim);border:1px solid rgba(0,212,255,0.2);border-radius:999px;padding:0.25rem 0.85rem;margin-bottom:1rem;}
.hire-cta h2{font-family:var(--fd);font-size:clamp(1.5rem,3vw,2.1rem);font-weight:800;color:var(--t1);letter-spacing:-0.03em;margin-bottom:0.75rem;position:relative;z-index:1;}
.hire-cta p{font-size:0.93rem;color:var(--t5);max-width:500px;margin:0 auto 2rem;line-height:1.75;position:relative;z-index:1;}
.hire-actions{display:flex;gap:0.9rem;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.btn-cy{display:inline-flex;align-items:center;gap:6px;background:var(--cyan);color:var(--n9);font-family:var(--fb);font-size:0.88rem;font-weight:700;padding:0.72rem 1.6rem;border-radius:999px;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 16px var(--cglow);transition:transform 0.15s,box-shadow 0.2s;}
.btn-cy:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--cglow);}
.btn-ol{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--t1);font-family:var(--fb);font-size:0.88rem;font-weight:500;padding:0.72rem 1.5rem;border-radius:999px;border:1px solid var(--bn);text-decoration:none;cursor:pointer;transition:all 0.15s;}
.btn-ol:hover{border-color:rgba(0,212,255,0.35);background:var(--cdim);}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1.5rem;text-align:center;}
.spin{width:52px;height:52px;border:3px solid var(--bw);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-family:var(--fd);font-size:1.5rem;font-weight:800;color:var(--ow9);}
.loading-sub{font-size:0.88rem;color:var(--ow5);max-width:300px;line-height:1.65;}

.footer{font-size:0.75rem;color:var(--ow3);text-align:center;margin-top:2.5rem;padding-bottom:1.5rem;}
@media(max-width:700px){.pillars-grid{grid-template-columns:repeat(3,1fr);}.insights-grid{grid-template-columns:1fr;}.score-hero{flex-direction:column;align-items:flex-start;gap:1rem;}.score-num{font-size:4rem;}.dim-hdr,.dim-row{grid-template-columns:1fr 44px 80px;padding:0.75rem 1rem;}.main{padding:2rem 1rem 6rem;}.hire-cta{padding:2.5rem 1.5rem;}}
@media(max-width:500px){.pillars-grid{grid-template-columns:repeat(2,1fr);}}</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand"><span class="bmark">D</span>Datavoris</a>
  <a href="index.html#contact" class="hire-btn">Get Better Data →</a>
</nav>

<main class="main" id="main">
  <div class="loading-wrap" id="loadingState">
    <div class="spin"></div>
    <div class="loading-title">Building your report…</div>
    <div class="loading-sub">Scoring your 5 pillars and generating personalised insights.</div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const PILLAR_META={
  infrastructure:{label:'Data Infrastructure',short:'Infra',color:'#00d4ff',keys:['q1','q2','q3','q4']},
  reporting:{label:'Reporting & Dashboards',short:'Reporting',color:'#5b9dff',keys:['q5','q6','q7','q8']},
  automation:{label:'Automation & Workflows',short:'Automation',color:'#10d9a0',keys:['q9','q10','q11']},
  ai:{label:'AI Readiness',short:'AI',color:'#f59e0b',keys:['q12','q13','q14']},
  decisions:{label:'Decision Culture',short:'Decisions',color:'#fb7185',keys:['q15','q16','q17','q18','q19']},
};
const Q_META={
  q1:{label:'Data Storage',pillar:'infrastructure'},q2:{label:'Data Quality',pillar:'infrastructure'},
  q3:{label:'Data Access',pillar:'infrastructure'},q4:{label:'System Integration',pillar:'infrastructure'},
  q5:{label:'Report Freshness',pillar:'reporting'},q6:{label:'Report Usefulness',pillar:'reporting'},
  q7:{label:'Manual Effort',pillar:'reporting'},q8:{label:'KPI Visibility',pillar:'reporting'},
  q9:{label:'Repetitive Tasks',pillar:'automation'},q10:{label:'Tool Connections',pillar:'automation'},
  q11:{label:'Error Reduction',pillar:'automation'},
  q12:{label:'AI Adoption',pillar:'ai'},q13:{label:'Data Readiness for AI',pillar:'ai'},q14:{label:'AI ROI Awareness',pillar:'ai'},
  q15:{label:'Decision Quality',pillar:'decisions'},q16:{label:'Data Confidence',pillar:'decisions'},
  q17:{label:'Speed of Insight',pillar:'decisions'},q18:{label:'Data Culture',pillar:'decisions'},q19:{label:'Future Readiness',pillar:'decisions'},
};
const TIER={
  advanced:{min:8.5,label:'Advanced',bg:'rgba(16,217,160,0.15)',color:'#10d9a0',desc:"Your organisation operates at an advanced level of data maturity. You have the infrastructure, automation, and culture to make decisions confidently from live data. The opportunity now is to leverage AI more strategically and compound your advantages."},
  proficient:{min:6.5,label:'Proficient',bg:'rgba(0,212,255,0.15)',color:'#00d4ff',desc:"Your data setup is working but there are meaningful gaps holding you back from full potential. Systems exist but may be fragile or manual in places. With targeted improvements — especially in automation and reporting — you'll unlock significantly more value."},
  developing:{min:4.5,label:'Developing',bg:'rgba(245,158,11,0.15)',color:'#f59e0b',desc:"Your organisation has started its data journey but is still relying heavily on manual processes, disconnected tools, and ad hoc reporting. There is significant untapped value in fixing your foundations — infrastructure and automation improvements will have the highest ROI."},
  reactive:{min:0,label:'Reactive',bg:'rgba(251,113,133,0.15)',color:'#fb7185',desc:"Your data setup is largely reactive — decisions are made without reliable, timely data and most reporting is manual. The good news: this also means there's enormous room for quick wins. Even basic automation and a simple dashboard would transform your team's daily experience."},
};
const INSIGHTS={
  infrastructure:{s:"Your data infrastructure is a genuine asset — data is reliable, centralised, and accessible. This foundation supports everything else you want to build.",g:"Your data infrastructure has gaps that are limiting everything downstream. Disconnected systems and untrustworthy data are the root cause of most manual work and poor decisions."},
  reporting:{s:"Your reporting setup is working well — dashboards are automated, useful, and trusted. This is rare and gives your team a real advantage in speed of decision making.",g:"Reporting is consuming too much time and delivering too little clarity. Automating your core dashboards would be one of the highest-ROI changes you could make right now."},
  automation:{s:"Automation is embedded in how your organisation operates. Manual errors are rare and your tools work together — this is a significant competitive advantage.",g:"Manual processes are slowing your team down and creating data errors. Automation is the single biggest lever available to you — the hours saved compound every week."},
  ai:{s:"Your organisation is already leveraging AI effectively and your data is in good enough shape to power intelligent workflows. You're ahead of most businesses at your stage.",g:"AI readiness is low — but that's often a data infrastructure problem more than an AI problem. Getting your data foundations right is the prerequisite to meaningful AI adoption."},
  decisions:{s:"Data-driven decision making is embedded in your culture. Your team trusts the numbers and can get answers quickly — this gives you a clear speed advantage over less informed competitors.",g:"Decisions are too often based on assumptions rather than data. This limits your ability to move quickly, identify opportunities, and manage risk. Better dashboards and clearer KPIs are the starting point."},
};
const PRIORITY_COPY={
  infrastructure:["Fix your data foundation first","Your scores suggest data is scattered across tools and spreadsheets. The first step is consolidating into a single source of truth — whether that's a simple integrated Google Sheet system, a Notion database, or a proper data warehouse. Until this is fixed, everything downstream is unreliable."],
  reporting:["Automate your most painful reports","Identify the report that takes the most time to produce every week or month. That's the one to automate first. A well-built automated report pays for itself within weeks — and frees your team to do actual work instead of data formatting."],
  automation:["Connect your key tools","Map the top 3 manual data transfers your team does regularly. Each one is an automation opportunity. Zapier, Power Automate, or a simple Google Apps Script can often eliminate hours of weekly copy-paste work with a one-time setup."],
  ai:["Prepare your data for AI before adding AI","The biggest barrier to useful AI isn't the AI — it's dirty, unstructured data. Clean up your core datasets first. Once your data is reliable and structured, connecting an LLM pipeline becomes straightforward and highly effective."],
  decisions:["Build one dashboard that answers your top 5 business questions","Most organisations don't need 20 dashboards. They need one great one. Define the 5 questions your leadership needs answered every week and build a single live view that answers them automatically."],
};

function getTier(score){
  if(score>=8.5)return TIER.advanced;
  if(score>=6.5)return TIER.proficient;
  if(score>=4.5)return TIER.developing;
  return TIER.reactive;
}
function getStatus(score){
  if(score>=7)return{cls:'st-strong',label:'Strong'};
  if(score>=5)return{cls:'st-mid',label:'Developing'};
  return{cls:'st-low',label:'Focus Area'};
}

function init(){
  const raw=sessionStorage.getItem('dv_assessment');
  if(!raw){
    document.getElementById('main').innerHTML=`<div style="text-align:center;padding:4rem 1rem"><div style="font-family:'Cabinet Grotesk',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:1rem;color:var(--ow9)">No results found</div><p style="color:var(--ow5);margin-bottom:2rem">Please complete the assessment first.</p><a href="dv-assessment.html" style="background:var(--cyan);color:var(--n9);padding:0.7rem 1.5rem;border-radius:999px;text-decoration:none;font-weight:700;font-size:0.88rem">Take the assessment →</a></div>`;
    return;
  }
  const {scores,ctx,pillars,overall}=JSON.parse(raw);
  const tier=getTier(overall);
  const firstName=ctx.fname||'there';

  // Sort pillars for strengths and gaps
  const pillarArr=Object.entries(pillars).map(([k,v])=>({key:k,score:v,...PILLAR_META[k]}));
  const sorted=[...pillarArr].sort((a,b)=>b.score-a.score);
  const topStrengths=sorted.slice(0,2);
  const topGaps=sorted.slice(-2).reverse();
  const topPriority=sorted[sorted.length-1];

  // Build Q rows
  const qRows=Object.entries(Q_META).map(([k,m])=>{
    const sc=scores[k]||5;
    const st=getStatus(sc);
    const pm=PILLAR_META[m.pillar];
    return `<div class="dim-row">
      <div><div class="dim-name">${m.label}</div><div class="dim-pillar">${pm.label}</div></div>
      <div class="dim-score-val">${sc}<span style="font-size:0.7rem;color:var(--ow3)">/10</span></div>
      <div style="text-align:right"><span class="dim-status ${st.cls}">${st.label}</span></div>
    </div>`;
  }).join('');

  // Priority actions — bottom 3 pillars
  const bottom3=sorted.slice(-3).reverse();
  const priorityHTML=bottom3.map((p,i)=>{
    const copy=PRIORITY_COPY[p.key];
    return `<div class="priority-item"><div class="priority-num">${i+1}</div><div class="priority-content"><div class="priority-title">${copy[0]}</div><p class="priority-text">${copy[1]}</p></div></div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="fade">
      <div class="page-eyebrow">Data Maturity Report · Datavoris</div>
      <h1 class="page-title">Here's where your data setup <em>actually stands</em>, ${firstName}.</h1>
      <p class="page-sub">Scored across 5 pillars of data maturity — infrastructure, reporting, automation, AI readiness, and decision culture. ${ctx.industry?'Benchmarked for the '+ctx.industry+' sector.':''}</p>
    </div>

    <div class="score-hero fade2">
      <div class="score-num">${overall}<sub>/10</sub></div>
      <div class="score-meta">
        <div class="tier-badge" style="background:${tier.bg};color:${tier.color}">${tier.label}</div>
        <div class="score-desc">${tier.desc}</div>
      </div>
    </div>

    <div class="fade3">
      <div class="sec-label" style="margin-top:2rem">Score by pillar</div>
      <div class="pillars-grid">
        ${pillarArr.map(p=>{
          const pct=((p.score-1)/9*100).toFixed(0);
          return `<div class="pillar-card" style="">
            <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${p.color}"></div>
            <div class="pillar-name">${p.short}</div>
            <div class="pillar-score" style="color:${p.color}">${p.score}</div>
            <div class="pillar-bar-bg"><div class="pillar-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
            <div class="pillar-label">${getStatus(p.score).label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="fade3">
      <div class="sec-label" style="margin-top:2rem">Radar — all 5 pillars</div>
      <div class="radar-card">
        <div class="radar-wrap"><canvas id="radarChart"></canvas></div>
      </div>
    </div>

    <div class="fade4">
      <div class="sec-label" style="margin-top:2rem">Where you stand out — and where to focus</div>
      <div class="insights-grid">
        ${topStrengths.map(p=>`
          <div class="insight-card strength">
            <div class="ins-type">↑ Strength</div>
            <div class="ins-dim">${p.label}</div>
            <div class="ins-text">${INSIGHTS[p.key].s}</div>
          </div>`).join('')}
        ${topGaps.map(p=>`
          <div class="insight-card gap">
            <div class="ins-type">↓ Focus Area</div>
            <div class="ins-dim">${p.label}</div>
            <div class="ins-text">${INSIGHTS[p.key].g}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="fade4">
      <div class="sec-label" style="margin-top:2rem">Score breakdown — all 19 questions</div>
      <div class="dim-table">
        <div class="dim-hdr"><div>Dimension</div><div style="text-align:center">Score</div><div style="text-align:right">Status</div></div>
        ${qRows}
      </div>
    </div>

    <div class="fade5">
      <div class="sec-label" style="margin-top:2rem">Your top 3 priority actions</div>
      <div class="priority-list">${priorityHTML}</div>
    </div>

    <div class="hire-cta fade5">
      <div class="hire-eyebrow">Connect with Ankush</div>
      <h2>Ready to get better data in your organisation?</h2>
      <p>I've helped 120+ businesses move from spreadsheet chaos to automated clarity. Based on your results, I can tell you exactly what to fix first — and build it for you.</p>
      <div class="hire-actions">
        <a href="index.html#contact" class="btn-cy">Work with me on this →</a>
        <a href="https://www.upwork.com/freelancers/~01a6376af8de9ca070" target="_blank" rel="noopener" class="btn-ol">Hire on Upwork ↗</a>
        <a href="dv-assessment.html" class="btn-ol">Retake assessment</a>
      </div>
    </div>

    <div class="footer">datavoris.com · Data Maturity Assessment · Ankush Gulati</div>
  `;

  // Draw radar
  const ctx2=document.getElementById('radarChart').getContext('2d');
  new Chart(ctx2,{
    type:'radar',
    data:{
      labels:pillarArr.map(p=>p.short),
      datasets:[{
        label:'Your scores',
        data:pillarArr.map(p=>p.score),
        borderColor:'#00d4ff',
        backgroundColor:'rgba(0,212,255,0.1)',
        borderWidth:2.5,
        pointBackgroundColor:'#00d4ff',
        pointRadius:5,
        pointHoverRadius:7,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      animation:{duration:1000,easing:'easeOutQuart'},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.r}/10`},backgroundColor:var_n8(),titleColor:'#f0f6ff',bodyColor:'rgba(240,246,255,0.75)',padding:10,cornerRadius:8}},
      scales:{r:{min:0,max:10,ticks:{stepSize:2,color:'#7a90b8',font:{family:"'DM Sans',sans-serif",size:10},backdropColor:'transparent'},grid:{color:'rgba(8,14,30,0.08)',lineWidth:1},angleLines:{color:'rgba(8,14,30,0.08)'},pointLabels:{font:{family:"'Cabinet Grotesk',sans-serif",size:window.innerWidth<500?10:12,weight:'700'},color:'#1a2744',padding:8}}}
    }
  });
}
function var_n8(){return '#0a1628';}
init();
</script>
</body>
